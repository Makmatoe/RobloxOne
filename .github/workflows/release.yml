name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-and-build:
    name: Validate and build release input
    runs-on: windows-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.release-metadata.outputs.version }}
      tag: ${{ steps.release-metadata.outputs.tag }}
    steps:
      - name: Check out the tagged commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch the protected main branch
        shell: pwsh
        run: git fetch --no-tags origin main:refs/remotes/origin/main

      - name: Install the pinned .NET SDK
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.0.300'
          cache: true
          cache-dependency-path: |
            **/packages.lock.json

      - name: Validate release metadata and repository policy
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: ./scripts/Verify-Release.ps1 -Tag $env:RELEASE_TAG -RequireTagAtHead -RequireMainAtHead

      - name: Build, test, and publish the application
        shell: pwsh
        run: ./scripts/Build.ps1 -Configuration Release -Runtime win-x64 -OutputDirectory artifacts/release-input/app -CI

      - name: Publish the descriptor signer
        shell: pwsh
        run: >-
          dotnet publish RobloxOneLauncher/tools/ReleaseSigner/ReleaseSigner.csproj
          --configuration Release --runtime win-x64 --self-contained true --no-restore
          --output artifacts/release-input/signer
          -p:ContinuousIntegrationBuild=true -p:Deterministic=true

      - name: Stage the exact Velopack CLI
        shell: pwsh
        run: >-
          dotnet tool install vpk --version 1.2.0 --tool-path artifacts/release-input/vpk-tool
          --disable-parallel

      - name: Stage immutable release metadata
        id: release-metadata
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          [xml] $project = Get-Content RobloxOneLauncher/RobloxOneLauncher.csproj -Raw
          $version = @($project.SelectNodes('/Project/PropertyGroup/Version') | ForEach-Object { $_.InnerText } | Where-Object { $_ })
          if (@($version).Count -ne 1) { throw 'Expected exactly one project version.' }
          $tag = $env:RELEASE_TAG
          Copy-Item "RobloxOneLauncher/ReleaseNotes/$version.md" artifacts/release-input/notes.md
          Copy-Item RobloxOneLauncher/Resources/update-public-key.pem artifacts/release-input/update-public-key.pem
          Copy-Item global.json artifacts/release-input/global.json
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload verified release input
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-input-${{ github.sha }}
          path: artifacts/release-input
          if-no-files-found: error
          include-hidden-files: true
          compression-level: 0
          retention-days: 1

  sign-attest-and-publish:
    name: Sign, attest, and publish
    needs: validate-and-build
    runs-on: windows-latest
    timeout-minutes: 30
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download verified release input
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-input-${{ github.sha }}
          path: release-input

      - name: Install the pinned .NET SDK
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.0.300'

      - name: Require protected signing configuration
        shell: pwsh
        env:
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          AZURE_SIGNING_ENDPOINT: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          AZURE_SIGNING_ACCOUNT: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          AZURE_SIGNING_PROFILE: ${{ vars.AZURE_SIGNING_PROFILE }}
          EXPECTED_PUBLISHER_SUBJECT: ${{ vars.EXPECTED_PUBLISHER_SUBJECT }}
          UPDATE_SIGNING_PRIVATE_KEY_PEM: ${{ secrets.UPDATE_SIGNING_PRIVATE_KEY_PEM }}
          SOURCE_REPOSITORY: ${{ github.repository }}
        run: |
          $required = @(
            'AZURE_CLIENT_ID', 'AZURE_TENANT_ID', 'AZURE_SUBSCRIPTION_ID',
            'AZURE_SIGNING_ENDPOINT', 'AZURE_SIGNING_ACCOUNT', 'AZURE_SIGNING_PROFILE',
            'EXPECTED_PUBLISHER_SUBJECT', 'UPDATE_SIGNING_PRIVATE_KEY_PEM'
          )
          foreach ($name in $required) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              throw "Protected release configuration '$name' is missing. No unsigned release will be produced."
            }
          }
          if ($env:SOURCE_REPOSITORY -cne 'Makmatoe/RobloxOne') {
            throw 'This workflow may publish only from Makmatoe/RobloxOne.'
          }

      - name: Authenticate to Azure with OpenID Connect
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Create Azure Artifact Signing metadata
        shell: pwsh
        env:
          AZURE_SIGNING_ENDPOINT: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          AZURE_SIGNING_ACCOUNT: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          AZURE_SIGNING_PROFILE: ${{ vars.AZURE_SIGNING_PROFILE }}
        run: |
          $metadata = [ordered]@{
            Endpoint = $env:AZURE_SIGNING_ENDPOINT
            CodeSigningAccountName = $env:AZURE_SIGNING_ACCOUNT
            CertificateProfileName = $env:AZURE_SIGNING_PROFILE
          }
          $metadata | ConvertTo-Json | Set-Content signing-metadata.json -Encoding utf8NoBOM

      - name: Build and Authenticode-sign Velopack assets
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ needs.validate-and-build.outputs.version }}
        run: |
          New-Item -ItemType Directory release-output -Force | Out-Null
          & ./release-input/vpk-tool/vpk.exe pack `
            --packId RobloxOne `
            --packVersion $env:RELEASE_VERSION `
            --packDir ./release-input/app `
            --mainExe RobloxOne.exe `
            --packTitle 'Roblox One' `
            --packAuthors Makmatoe `
            --releaseNotes ./release-input/notes.md `
            --runtime win-x64 `
            --channel win-x64-stable `
            --outputDir ./release-output `
            --azureTrustedSignFile ./signing-metadata.json
          if ($LASTEXITCODE -ne 0) { throw "Velopack packaging failed with exit code $LASTEXITCODE." }

      - name: Verify Authenticode before releasing Azure credentials
        shell: pwsh
        env:
          EXPECTED_PUBLISHER_SUBJECT: ${{ vars.EXPECTED_PUBLISHER_SUBJECT }}
        run: |
          $executables = @(Get-ChildItem release-output -File -Filter *.exe)
          if ($executables.Count -eq 0) { throw 'Velopack produced no executable release asset.' }
          foreach ($file in $executables) {
            $signature = Get-AuthenticodeSignature -LiteralPath $file.FullName
            if ($signature.Status -ne 'Valid') { throw "Invalid signature on $($file.Name): $($signature.StatusMessage)" }
            if ($null -eq $signature.SignerCertificate -or $signature.SignerCertificate.Subject -cne $env:EXPECTED_PUBLISHER_SUBJECT) {
              throw "Unexpected publisher on $($file.Name)."
            }
          }

          $package = @(Get-ChildItem release-output -File -Filter *-full.nupkg)
          if ($package.Count -ne 1) { throw "Expected one full package; found $($package.Count)." }
          $unpack = Join-Path $env:RUNNER_TEMP package-verification
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::ExtractToDirectory($package[0].FullName, $unpack)
          $application = @(Get-ChildItem $unpack -Recurse -File -Filter RobloxOne.exe)
          if ($application.Count -ne 1) { throw "Expected one packaged RobloxOne.exe; found $($application.Count)." }
          $signature = Get-AuthenticodeSignature -LiteralPath $application[0].FullName
          if ($signature.Status -ne 'Valid' -or $null -eq $signature.SignerCertificate -or
              $signature.SignerCertificate.Subject -cne $env:EXPECTED_PUBLISHER_SUBJECT) {
            throw 'The packaged RobloxOne.exe does not have the expected valid signature.'
          }

          $portable = @(Get-ChildItem release-output -File -Filter *-Portable.zip)
          if ($portable.Count -ne 1) { throw "Expected one portable ZIP; found $($portable.Count)." }
          $portableUnpack = Join-Path $env:RUNNER_TEMP portable-verification
          [System.IO.Compression.ZipFile]::ExtractToDirectory($portable[0].FullName, $portableUnpack)
          $portableApplication = @(Get-ChildItem $portableUnpack -Recurse -File -Filter RobloxOne.exe)
          if ($portableApplication.Count -ne 1) {
            throw "Expected one portable RobloxOne.exe; found $($portableApplication.Count)."
          }
          $portableSignature = Get-AuthenticodeSignature -LiteralPath $portableApplication[0].FullName
          if ($portableSignature.Status -ne 'Valid' -or $null -eq $portableSignature.SignerCertificate -or
              $portableSignature.SignerCertificate.Subject -cne $env:EXPECTED_PUBLISHER_SUBJECT) {
            throw 'The portable RobloxOne.exe does not have the expected valid signature.'
          }

      - name: Clear Azure session and signing metadata
        if: always()
        shell: pwsh
        run: |
          az logout 2>$null
          az account clear 2>$null
          Remove-Item signing-metadata.json -Force -ErrorAction SilentlyContinue

      - name: Sign the release descriptor
        shell: pwsh
        env:
          UPDATE_SIGNING_PRIVATE_KEY_PEM: ${{ secrets.UPDATE_SIGNING_PRIVATE_KEY_PEM }}
          ACTIONS_ID_TOKEN_REQUEST_TOKEN: ""
          ACTIONS_ID_TOKEN_REQUEST_URL: ""
          RELEASE_VERSION: ${{ needs.validate-and-build.outputs.version }}
          RELEASE_TAG: ${{ needs.validate-and-build.outputs.tag }}
        run: |
          $package = @(Get-ChildItem release-output -File -Filter *-full.nupkg)
          if ($package.Count -ne 1) { throw "Expected one full package; found $($package.Count)." }
          & ./release-input/signer/ReleaseSigner.exe sign `
            --package $package[0].FullName `
            --notes ./release-input/notes.md `
            --output ./release-output/robloxone-release.json `
            --repository Makmatoe/RobloxOne `
            --channel win-x64-stable `
            --version $env:RELEASE_VERSION `
            --tag $env:RELEASE_TAG `
            --private-key-env UPDATE_SIGNING_PRIVATE_KEY_PEM
          if ($LASTEXITCODE -ne 0) { throw "Descriptor signing failed with exit code $LASTEXITCODE." }

      - name: Verify the signed descriptor and checksums
        shell: pwsh
        run: |
          $package = @(Get-ChildItem release-output -File -Filter *-full.nupkg)
          & ./release-input/signer/ReleaseSigner.exe verify `
            --manifest ./release-output/robloxone-release.json `
            --package $package[0].FullName `
            --public-key ./release-input/update-public-key.pem
          if ($LASTEXITCODE -ne 0) { throw "Descriptor verification failed with exit code $LASTEXITCODE." }

          $files = @(Get-ChildItem release-output -File | Sort-Object Name)
          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash -LiteralPath $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($file.Name)"
          }
          $lines | Set-Content ./release-output/SHA256SUMS.txt -Encoding ascii

      - name: Create or reuse a draft GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate-and-build.outputs.tag }}
          RELEASE_VERSION: ${{ needs.validate-and-build.outputs.version }}
        run: |
          $tag = $env:RELEASE_TAG
          $draftState = gh release view $tag --repo $env:GITHUB_REPOSITORY --json isDraft --jq .isDraft 2>$null
          if ($LASTEXITCODE -eq 0) {
            if ($draftState -ne 'true') { throw "Release $tag already exists and is not a draft." }
          } else {
            gh release create $tag --repo $env:GITHUB_REPOSITORY --verify-tag --draft `
              --title "Roblox One $env:RELEASE_VERSION" `
              --notes-file ./release-input/notes.md
            if ($LASTEXITCODE -ne 0) { throw 'Unable to create the draft release.' }
          }

      - name: Upload and independently verify draft assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate-and-build.outputs.tag }}
        run: |
          $tag = $env:RELEASE_TAG
          $assets = @(Get-ChildItem release-output -File | Sort-Object Name)
          [string[]] $assetPaths = $assets.FullName
          & gh release upload $tag @assetPaths --repo $env:GITHUB_REPOSITORY --clobber
          if ($LASTEXITCODE -ne 0) { throw 'Unable to upload draft release assets.' }

          New-Item -ItemType Directory verified-assets -Force | Out-Null
          gh release download $tag --repo $env:GITHUB_REPOSITORY --dir verified-assets --pattern '*'
          if ($LASTEXITCODE -ne 0) { throw 'Unable to download draft release assets for verification.' }

          $downloaded = @(Get-ChildItem verified-assets -File | Sort-Object Name)
          if ($downloaded.Count -ne $assets.Count) { throw 'Downloaded asset count does not match the upload.' }
          for ($index = 0; $index -lt $assets.Count; $index++) {
            if ($assets[$index].Name -cne $downloaded[$index].Name) { throw 'Downloaded asset names do not match the upload.' }
            $localHash = (Get-FileHash -LiteralPath $assets[$index].FullName -Algorithm SHA256).Hash
            $remoteHash = (Get-FileHash -LiteralPath $downloaded[$index].FullName -Algorithm SHA256).Hash
            if ($localHash -cne $remoteHash) { throw "Draft asset hash mismatch: $($assets[$index].Name)" }
          }

      - name: Attest the verified release assets
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: verified-assets/*

      - name: Publish the verified draft
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate-and-build.outputs.tag }}
        run: |
          gh release edit $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY --draft=false --latest
          if ($LASTEXITCODE -ne 0) { throw 'Unable to publish the verified draft release.' }
