name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-and-build:
    name: Validate and build release input
    runs-on: windows-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.release-metadata.outputs.version }}
      tag: ${{ steps.release-metadata.outputs.tag }}
    steps:
      - name: Check out the tagged commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch the protected main branch
        shell: pwsh
        run: git fetch --no-tags origin main:refs/remotes/origin/main

      - name: Install the pinned .NET SDK
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.0.300'
          cache: true
          cache-dependency-path: |
            **/packages.lock.json

      - name: Validate release metadata and repository policy
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: >-
          ./scripts/Verify-Release.ps1 -Tag $env:RELEASE_TAG -RequireTagAtHead
          -RequireMainAtHead -RequireAnnotatedTag -RequireCleanWorkingTree

      - name: Build, test, and publish the application
        shell: pwsh
        run: ./scripts/Build.ps1 -Configuration Release -Runtime win-x64 -OutputDirectory artifacts/release-input/app -CI

      - name: Run the isolated published-executable smoke
        shell: pwsh
        run: ./scripts/Test-RuntimeSmoke.ps1 -ApplicationPath artifacts/release-input/app/SessionDock.exe -TimeoutSeconds 30

      - name: Publish the descriptor signer
        shell: pwsh
        run: >-
          dotnet publish SessionDock/tools/ReleaseSigner/ReleaseSigner.csproj
          --configuration Release --runtime win-x64 --self-contained true --no-restore
          --output artifacts/release-input/signer
          -p:ContinuousIntegrationBuild=true -p:Deterministic=true
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true -p:DebugType=none -p:DebugSymbols=false

      - name: Stage the exact Velopack CLI
        shell: pwsh
        run: >-
          dotnet tool install vpk --version 1.2.0 --tool-path artifacts/release-input/vpk-tool
          --disable-parallel

      - name: Stage immutable release metadata
        id: release-metadata
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          [xml] $project = Get-Content SessionDock/SessionDock.csproj -Raw
          $version = @($project.SelectNodes('/Project/PropertyGroup/Version') | ForEach-Object { $_.InnerText } | Where-Object { $_ })
          if (@($version).Count -ne 1) { throw 'Expected exactly one project version.' }
          $tag = $env:RELEASE_TAG
          Copy-Item "SessionDock/ReleaseNotes/$version.md" artifacts/release-input/notes.md
          Copy-Item SessionDock/Resources/update-public-key.pem artifacts/release-input/update-public-key.pem
          Copy-Item SessionDock/SessionDock.csproj artifacts/release-input/application.csproj
          Copy-Item SessionDock/packages.lock.json artifacts/release-input/packages.lock.json
          Copy-Item global.json artifacts/release-input/global.json
          New-Item -ItemType Directory artifacts/release-input/scripts -Force | Out-Null
          Copy-Item scripts/New-ReleaseChecksums.ps1 artifacts/release-input/scripts/New-ReleaseChecksums.ps1
          Copy-Item scripts/New-ReleaseSbom.ps1 artifacts/release-input/scripts/New-ReleaseSbom.ps1
          Copy-Item scripts/Rename-SessionDockReleaseAssets.ps1 artifacts/release-input/scripts/Rename-SessionDockReleaseAssets.ps1
          Copy-Item scripts/ReleaseJson.ps1 artifacts/release-input/scripts/ReleaseJson.ps1
          Copy-Item scripts/Verify-Assets.ps1 artifacts/release-input/scripts/Verify-Assets.ps1
          Copy-Item scripts/Verify-ReleaseLicense.ps1 artifacts/release-input/scripts/Verify-ReleaseLicense.ps1
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload verified release input
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-input-${{ github.sha }}
          path: artifacts/release-input
          if-no-files-found: error
          include-hidden-files: true
          compression-level: 0
          retention-days: 1

  sign-attest-and-stage:
    name: Sign, attest, and stage verified draft
    needs: validate-and-build
    runs-on: windows-latest
    timeout-minutes: 30
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Download verified release input
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-input-${{ github.sha }}
          path: release-input

      - name: Install the pinned .NET SDK
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.0.300'

      - name: Validate protected release context and license
        shell: pwsh
        env:
          SOURCE_REPOSITORY: ${{ github.repository }}
        run: |
          if ($env:SOURCE_REPOSITORY -cne 'Makmatoe/SessionDock') {
            throw 'This workflow may publish only from Makmatoe/SessionDock.'
          }
          & ./release-input/scripts/Verify-ReleaseLicense.ps1 `
            -LicensePath ./release-input/app/LICENSE.md

      - name: Build Velopack assets
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ needs.validate-and-build.outputs.version }}
        run: |
          New-Item -ItemType Directory release-output -Force | Out-Null
          & ./release-input/vpk-tool/vpk.exe pack `
            --packId SessionDockApp `
            --packVersion $env:RELEASE_VERSION `
            --packDir ./release-input/app `
            --mainExe SessionDock.exe `
            --packTitle SessionDock `
            --packAuthors Makmatoe `
            --releaseNotes ./release-input/notes.md `
            --runtime win-x64 `
            --channel win-x64-sessiondock `
            --outputDir ./release-output
          if ($LASTEXITCODE -ne 0) { throw "Velopack packaging failed with exit code $LASTEXITCODE." }
          & ./release-input/scripts/Rename-SessionDockReleaseAssets.ps1 `
            -Directory ./release-output `
            -Channel win-x64-sessiondock

      - name: Sign the release descriptor
        shell: pwsh
        env:
          UPDATE_SIGNING_PRIVATE_KEY_PKCS8_BASE64: ${{ secrets.UPDATE_SIGNING_PRIVATE_KEY_PKCS8_BASE64 }}
          ACTIONS_ID_TOKEN_REQUEST_TOKEN: ""
          ACTIONS_ID_TOKEN_REQUEST_URL: ""
          RELEASE_VERSION: ${{ needs.validate-and-build.outputs.version }}
          RELEASE_TAG: ${{ needs.validate-and-build.outputs.tag }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:UPDATE_SIGNING_PRIVATE_KEY_PKCS8_BASE64)) {
            throw 'The protected release descriptor signing key is not configured.'
          }
          $package = @(Get-ChildItem release-output -File -Filter *-full.nupkg)
          if ($package.Count -ne 1) { throw "Expected one full package; found $($package.Count)." }
          & ./release-input/signer/ReleaseSigner.exe sign `
            --package $package[0].FullName `
            --notes ./release-input/notes.md `
            --output ./release-output/sessiondock-release.json `
            --repository Makmatoe/SessionDock `
            --channel win-x64-sessiondock `
            --version $env:RELEASE_VERSION `
            --tag $env:RELEASE_TAG `
            --private-key-base64-env UPDATE_SIGNING_PRIVATE_KEY_PKCS8_BASE64 `
            --identity current
          if ($LASTEXITCODE -ne 0) { throw "Descriptor signing failed with exit code $LASTEXITCODE." }

      - name: Verify the signed descriptor and assemble release metadata
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ needs.validate-and-build.outputs.version }}
        run: |
          $package = @(Get-ChildItem release-output -File -Filter *-full.nupkg)
          & ./release-input/signer/ReleaseSigner.exe verify `
            --manifest ./release-output/sessiondock-release.json `
            --package $package[0].FullName `
            --public-key ./release-input/update-public-key.pem
          if ($LASTEXITCODE -ne 0) { throw "Descriptor verification failed with exit code $LASTEXITCODE." }

          & ./release-input/scripts/New-ReleaseSbom.ps1 `
            -Descriptor ./release-output/sessiondock-release.json `
            -Project ./release-input/application.csproj `
            -LockFile ./release-input/packages.lock.json `
            -License ./release-input/app/LICENSE.md `
            -Output "./release-output/SessionDock-$env:RELEASE_VERSION-sbom.spdx.json"
          & ./release-input/scripts/New-ReleaseChecksums.ps1 -Directory ./release-output

      - name: Verify the final release asset set
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.validate-and-build.outputs.tag }}
        run: |
          & ./release-input/scripts/Verify-Assets.ps1 `
            -Directory ./release-output `
            -Manifest ./release-output/sessiondock-release.json `
            -PublishedApplicationDirectory ./release-input/app `
            -ExpectedTag $env:RELEASE_TAG

      - name: Create a fresh draft GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate-and-build.outputs.tag }}
          RELEASE_VERSION: ${{ needs.validate-and-build.outputs.version }}
        run: |
          $tag = $env:RELEASE_TAG
          gh release view $tag --repo $env:GITHUB_REPOSITORY 2>$null
          if ($LASTEXITCODE -eq 0) {
            throw "Release $tag already exists. Remove only a failed unpublished draft before rerunning."
          }
          gh release create $tag --repo $env:GITHUB_REPOSITORY --verify-tag --draft `
            --title "SessionDock $env:RELEASE_VERSION" `
            --notes-file ./release-input/notes.md
          if ($LASTEXITCODE -ne 0) { throw 'Unable to create the draft release.' }

      - name: Upload and independently verify draft assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate-and-build.outputs.tag }}
        run: |
          $tag = $env:RELEASE_TAG
          $assets = @(Get-ChildItem release-output -File | Sort-Object Name)
          [string[]] $assetPaths = $assets.FullName
          & gh release upload $tag @assetPaths --repo $env:GITHUB_REPOSITORY
          if ($LASTEXITCODE -ne 0) { throw 'Unable to upload draft release assets.' }

          New-Item -ItemType Directory verified-assets -Force | Out-Null
          gh release download $tag --repo $env:GITHUB_REPOSITORY --dir verified-assets --pattern '*'
          if ($LASTEXITCODE -ne 0) { throw 'Unable to download draft release assets for verification.' }

          $downloaded = @(Get-ChildItem verified-assets -File | Sort-Object Name)
          if ($downloaded.Count -ne $assets.Count) { throw 'Downloaded asset count does not match the upload.' }
          for ($index = 0; $index -lt $assets.Count; $index++) {
            if ($assets[$index].Name -cne $downloaded[$index].Name) { throw 'Downloaded asset names do not match the upload.' }
            $localHash = (Get-FileHash -LiteralPath $assets[$index].FullName -Algorithm SHA256).Hash
            $remoteHash = (Get-FileHash -LiteralPath $downloaded[$index].FullName -Algorithm SHA256).Hash
            if ($localHash -cne $remoteHash) { throw "Draft asset hash mismatch: $($assets[$index].Name)" }
          }

      - name: Attest the verified release assets
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: verified-assets/*

  publish-verified-release:
    name: Approve and publish verified release
    needs:
      - validate-and-build
      - sign-attest-and-stage
    runs-on: windows-latest
    timeout-minutes: 15
    environment: release-publication
    permissions:
      contents: write
      attestations: read
    steps:
      - name: Re-download and verify the approved draft
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate-and-build.outputs.tag }}
          RELEASE_VERSION: ${{ needs.validate-and-build.outputs.version }}
          EXPECTED_SIGNER_WORKFLOW: Makmatoe/SessionDock/.github/workflows/release.yml
          EXPECTED_SOURCE_REF: ${{ github.ref }}
          EXPECTED_SOURCE_DIGEST: ${{ github.sha }}
        run: |
          if ($env:GITHUB_REPOSITORY -cne 'Makmatoe/SessionDock') {
            throw 'This workflow may publish only from Makmatoe/SessionDock.'
          }
          if ($env:EXPECTED_SOURCE_REF -cne "refs/tags/$env:RELEASE_TAG" -or
              $env:EXPECTED_SOURCE_DIGEST -cnotmatch '^[0-9a-f]{40}$') {
            throw 'The approved release provenance does not identify the expected tag commit.'
          }

          $releaseJson = gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY --json isDraft,tagName,name
          if ($LASTEXITCODE -ne 0) { throw 'Unable to inspect the approved draft release.' }
          $release = $releaseJson | ConvertFrom-Json
          if (-not $release.isDraft -or
              $release.tagName -cne $env:RELEASE_TAG -or
              $release.name -cne "SessionDock $env:RELEASE_VERSION") {
            throw 'The approved release is not the expected verified draft.'
          }

          New-Item -ItemType Directory approved-assets -Force | Out-Null
          gh release download $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY --dir approved-assets --pattern '*'
          if ($LASTEXITCODE -ne 0) { throw 'Unable to download the approved draft assets.' }

          $expectedNames = @(
            'assets.win-x64-sessiondock.json'
            'RELEASES-win-x64-sessiondock'
            'releases.win-x64-sessiondock.json'
            "SessionDock-$env:RELEASE_VERSION-sbom.spdx.json"
            'sessiondock-release.json'
            'SessionDock-win-x64-Portable.zip'
            'SessionDock-win-x64-Setup.exe'
            "SessionDockApp-$env:RELEASE_VERSION-win-x64-sessiondock-full.nupkg"
            'SHA256SUMS.txt'
          ) | Sort-Object
          $assets = @(Get-ChildItem approved-assets -File | Sort-Object Name)
          $actualNames = @($assets.Name | Sort-Object)
          if (Compare-Object $expectedNames $actualNames -CaseSensitive) {
            throw 'The approved draft asset inventory is not exact.'
          }

          $checksumPath = Join-Path approved-assets 'SHA256SUMS.txt'
          $checksumEntries = [Collections.Generic.Dictionary[string, string]]::new(
            [StringComparer]::Ordinal)
          foreach ($line in Get-Content -LiteralPath $checksumPath) {
            if ($line -cnotmatch '^([0-9a-f]{64})  ([A-Za-z0-9][A-Za-z0-9._-]*)$') {
              throw 'The approved draft checksum file is malformed.'
            }
            if ($checksumEntries.ContainsKey($Matches[2])) {
              throw "The approved draft checksum file repeats $($Matches[2])."
            }
            $checksumEntries.Add($Matches[2], $Matches[1])
          }
          $expectedChecksumNames = @($actualNames | Where-Object { $_ -cne 'SHA256SUMS.txt' })
          if (Compare-Object `
              $expectedChecksumNames `
              @($checksumEntries.Keys | Sort-Object) `
              -CaseSensitive) {
            throw 'The approved draft checksums do not cover the exact asset set.'
          }
          foreach ($name in $expectedChecksumNames) {
            $actualHash = (Get-FileHash -LiteralPath (Join-Path approved-assets $name) -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($actualHash -cne $checksumEntries[$name]) {
              throw "Approved draft checksum mismatch: $name"
            }
          }

          foreach ($asset in $assets) {
            gh attestation verify $asset.FullName `
              --repo $env:GITHUB_REPOSITORY `
              --signer-workflow $env:EXPECTED_SIGNER_WORKFLOW `
              --source-ref $env:EXPECTED_SOURCE_REF `
              --source-digest $env:EXPECTED_SOURCE_DIGEST
            if ($LASTEXITCODE -ne 0) {
              throw "Approved draft attestation verification failed: $($asset.Name)"
            }
          }

      - name: Publish the reverified draft
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate-and-build.outputs.tag }}
        run: |
          $draftState = gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY --json isDraft --jq .isDraft
          if ($LASTEXITCODE -ne 0 -or $draftState -ne 'true') { throw 'The reverified release is no longer a draft.' }
          gh release edit $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY --draft=false --latest
          if ($LASTEXITCODE -ne 0) { throw 'Unable to publish the verified draft release.' }
