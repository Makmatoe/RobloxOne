name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test (Windows x64)
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Check out the repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install the pinned .NET SDK
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.0.300'
          cache: true
          cache-dependency-path: |
            **/packages.lock.json

      - name: Restore the pinned Velopack CLI
        shell: pwsh
        run: dotnet tool restore

      - name: Validate, build, test, and publish
        shell: pwsh
        run: ./scripts/Build.ps1 -Configuration Release -Runtime win-x64 -OutputDirectory artifacts/ci-publish -CI

      - name: Upload diagnostic build output
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: failed-build-output-${{ github.run_id }}
          path: |
            **/TestResults/**
            artifacts/**
          if-no-files-found: ignore
          retention-days: 3

  dependency-review:
    name: Dependency review
    if: >-
      github.event_name == 'pull_request' &&
      vars.DEPENDENCY_REVIEW_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Check out the repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
